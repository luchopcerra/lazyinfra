version: 2

project_name: lazyinfra

before:
  hooks:
    - go mod tidy

builds:
  - id: lazyinfra
    main: ./main.go
    binary: lazyinfra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

homebrew_casks:
  - repository:
      owner: luchopcerra
      name: homebrew-tap
    directory: Casks
    homepage: https://github.com/luchopcerra/lazyinfra
    description: "A fast, keyboard-driven AWS Serverless TUI"
    binaries:
      - lazyinfra

winget:
  - name: lazyinfra
    publisher: luchopcerra
    package_identifier: luchopcerra.lazyinfra
    package_name: lazyinfra
    homepage: https://github.com/luchopcerra/lazyinfra
    publisher_url: https://github.com/luchopcerra
    publisher_support_url: https://github.com/luchopcerra/lazyinfra/issues
    license: MIT
    license_url: https://github.com/luchopcerra/lazyinfra/blob/main/LICENSE
    short_description: A fast, keyboard-driven AWS Serverless TUI
    description: |
      lazyinfra is a fast, keyboard-driven AWS Serverless TUI for backend developers
      who want to inspect and interact with AWS Lambda, API Gateway, CloudWatch,
      and CloudFront infrastructure without leaving the terminal.
    release_notes: "{{ .Changelog }}"
    release_notes_url: "https://github.com/luchopcerra/lazyinfra/releases/tag/{{ .Tag }}"
    tags:
      - aws
      - cli
      - tui
      - serverless
      - lambda
    repository:
      owner: luchopcerra
      name: winget-pkgs
      branch: "lazyinfra-{{ .Version }}"
      pull_request:
        enabled: true
        draft: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: luchopcerra
    name: lazyinfra
  draft: false
  prerelease: auto
